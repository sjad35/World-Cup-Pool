<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup 2026 Bracket Pool</title>
<style>
  :root{
    --bg:#f4f5fb; --card:#ffffff; --text:#16182b; --muted:#6a6f86;
    --line:#e6e8f2; --accent:#7c3aed; --accent2:#ec4899; --accent3:#f59e0b;
    --good:#16a34a; --good-bg:#dcfce7; --bad:#dc2626; --shadow:0 8px 24px rgba(20,22,43,.08);
    --g1:#7c3aed; --g2:#ec4899; --g3:#f59e0b;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#0d0f1c; --card:#161a2e; --text:#f1f3fb; --muted:#9aa0bd;
      --line:#262b45; --accent:#a78bfa; --accent2:#f472b6; --accent3:#fbbf24;
      --good:#34d399; --good-bg:#0f3b2c; --bad:#f87171; --shadow:0 8px 28px rgba(0,0,0,.45);
    }
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);color:var(--text);line-height:1.45;-webkit-font-smoothing:antialiased}
  .wrap{max-width:760px;margin:0 auto;padding:0 14px 60px}
  header.topbar{background:linear-gradient(115deg,var(--g1),var(--g2) 55%,var(--g3));color:#fff;
    padding:18px 16px;border-radius:0 0 20px 20px;box-shadow:var(--shadow);position:sticky;top:0;z-index:30}
  .topbar-inner{max-width:760px;margin:0 auto;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .topbar h1{font-size:19px;margin:0;font-weight:800;letter-spacing:-.2px;display:flex;align-items:center;gap:8px}
  .topbar .who{margin-left:auto;font-size:13px;opacity:.95;display:flex;align-items:center;gap:8px}
  .pill{background:rgba(255,255,255,.2);padding:4px 10px;border-radius:999px;font-size:12px;font-weight:600}
  .linkbtn{background:none;border:none;color:#fff;text-decoration:underline;cursor:pointer;font-size:12px;opacity:.95}
  .tabs{display:flex;gap:6px;margin:16px 0 4px;flex-wrap:wrap}
  .tab{flex:1;min-width:90px;text-align:center;padding:10px;border-radius:12px;border:1px solid var(--line);
    background:var(--card);color:var(--muted);font-weight:700;cursor:pointer;font-size:14px}
  .tab.active{color:#fff;border-color:transparent;background:linear-gradient(120deg,var(--g1),var(--g2));box-shadow:var(--shadow)}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;margin:12px 0;box-shadow:var(--shadow)}
  h2{font-size:17px;margin:2px 0 10px;font-weight:800}
  h3{font-size:14px;margin:14px 0 8px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
  p.sub{color:var(--muted);font-size:13.5px;margin:6px 0}
  label{display:block;font-size:13px;font-weight:600;margin:12px 0 5px}
  input,select{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:10px;background:var(--bg);
    color:var(--text);font-size:15px;font-family:inherit}
  input:focus,select:focus{outline:2px solid var(--accent);border-color:transparent}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px;border:none;
    border-radius:12px;background:linear-gradient(120deg,var(--g1),var(--g2));color:#fff;font-weight:800;font-size:15px;cursor:pointer;margin-top:14px;box-shadow:var(--shadow)}
  .btn:active{transform:translateY(1px)}
  .btn.secondary{background:var(--card);color:var(--text);border:1px solid var(--line);box-shadow:none}
  .btn.small{width:auto;padding:8px 14px;font-size:13px;margin-top:0}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .row{display:flex;gap:8px;align-items:center}
  .countdown{display:inline-flex;align-items:center;gap:8px;background:var(--accent);color:#fff;padding:7px 13px;border-radius:999px;font-weight:700;font-size:13px}
  .countdown.locked{background:var(--bad)}
  .chips{display:flex;gap:6px;overflow-x:auto;padding:4px 0 8px;-webkit-overflow-scrolling:touch}
  .chip{white-space:nowrap;padding:7px 13px;border-radius:999px;border:1px solid var(--line);background:var(--card);color:var(--muted);font-weight:700;font-size:13px;cursor:pointer}
  .chip.active{background:linear-gradient(120deg,var(--g1),var(--g3));color:#fff;border-color:transparent}
  .match{border:1px solid var(--line);border-radius:14px;padding:8px;margin:10px 0;background:var(--bg)}
  .match .mhead{font-size:11px;color:var(--muted);font-weight:700;padding:2px 4px 6px;display:flex;justify-content:space-between}
  .teamrow{display:flex;gap:8px}
  .team{flex:1;display:flex;align-items:center;gap:9px;padding:11px;border-radius:11px;border:2px solid var(--line);background:var(--card);cursor:pointer;font-weight:700;font-size:14.5px;transition:.12s}
  .team:hover{border-color:var(--accent)}
  .team.picked{border-color:var(--accent);background:linear-gradient(120deg,rgba(124,58,237,.14),rgba(236,72,153,.14))}
  .team.correct{border-color:var(--good);background:var(--good-bg)}
  .team.wrong{opacity:.55}
  .team.winner-actual{box-shadow:inset 0 0 0 2px var(--good)}
  .team .flag{width:30px;height:22px;border-radius:4px;object-fit:cover;flex:none;box-shadow:0 1px 3px rgba(0,0,0,.25)}
  .team .emoji{font-size:22px;flex:none}
  .team .nm{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis}
  .team .chk{font-size:15px;color:var(--accent)}
  .badge{font-size:11px;font-weight:800;padding:2px 7px;border-radius:999px}
  .badge.win{background:var(--good-bg);color:var(--good)}
  .lb-row{display:flex;align-items:center;gap:12px;padding:12px;border-radius:12px;border:1px solid var(--line);margin:8px 0;background:var(--bg)}
  .lb-row.me{border-color:var(--accent);background:linear-gradient(120deg,rgba(124,58,237,.10),rgba(236,72,153,.10))}
  .lb-rank{font-size:20px;font-weight:900;width:34px;text-align:center;flex:none}
  .lb-name{font-weight:800;flex:1}
  .lb-pts{font-size:20px;font-weight:900}
  .lb-sub{font-size:11px;color:var(--muted);font-weight:600}
  .note{background:linear-gradient(120deg,rgba(245,158,11,.15),rgba(236,72,153,.10));border:1px solid var(--line);border-radius:12px;padding:11px 13px;font-size:13px;margin:10px 0}
  .err{color:var(--bad);font-size:13px;font-weight:600;margin-top:8px;min-height:18px}
  .ok{color:var(--good);font-size:13px;font-weight:700;margin-top:8px;min-height:18px}
  .admin-game{display:flex;gap:8px;align-items:center;margin:8px 0;flex-wrap:wrap}
  .admin-game select{flex:1;min-width:120px}
  .center{text-align:center}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .small-muted{font-size:12px;color:var(--muted)}
  a{color:var(--accent)}
  .spin{width:34px;height:34px;border:4px solid var(--line);border-top-color:var(--accent);border-radius:50%;animation:sp 1s linear infinite;margin:30px auto}
  @keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<header class="topbar"><div class="topbar-inner">
  <h1>🏆 <span id="poolTitle">World Cup 2026 Pool</span></h1>
  <div class="who" id="whoBox"></div>
</div></header>
<div class="wrap"><div id="screen"></div></div>

<script>
/* ===== World Cup 2026 Knockout Bracket Pool (Vercel + Upstash) ===== */

const TEAMS = {
  "South Africa":{e:"🇿🇦",c:"za"},"Canada":{e:"🇨🇦",c:"ca"},"Brazil":{e:"🇧🇷",c:"br"},
  "Japan":{e:"🇯🇵",c:"jp"},"Germany":{e:"🇩🇪",c:"de"},"Paraguay":{e:"🇵🇾",c:"py"},
  "Netherlands":{e:"🇳🇱",c:"nl"},"Morocco":{e:"🇲🇦",c:"ma"},"Ivory Coast":{e:"🇨🇮",c:"ci"},
  "Norway":{e:"🇳🇴",c:"no"},"USA":{e:"🇺🇸",c:"us"},"Bosnia and Herzegovina":{e:"🇧🇦",c:"ba"},
  "Croatia":{e:"🇭🇷",c:"hr"},"Portugal":{e:"🇵🇹",c:"pt"},"Colombia":{e:"🇨🇴",c:"co"},
  "Ghana":{e:"🇬🇭",c:"gh"},"England":{e:"🏴",c:"gb-eng"},"DR Congo":{e:"🇨🇩",c:"cd"},
  "Belgium":{e:"🇧🇪",c:"be"},"Senegal":{e:"🇸🇳",c:"sn"},"Spain":{e:"🇪🇸",c:"es"},
  "Austria":{e:"🇦🇹",c:"at"},"Switzerland":{e:"🇨🇭",c:"ch"},"Algeria":{e:"🇩🇿",c:"dz"},
  "Australia":{e:"🇦🇺",c:"au"},"Egypt":{e:"🇪🇬",c:"eg"},"Mexico":{e:"🇲🇽",c:"mx"},
  "Ecuador":{e:"🇪🇨",c:"ec"},"Argentina":{e:"🇦🇷",c:"ar"},"Cabo Verde":{e:"🇨🇻",c:"cv"},
  "France":{e:"🇫🇷",c:"fr"},"Sweden":{e:"🇸🇪",c:"se"}
};
const ALL_TEAM_NAMES = Object.keys(TEAMS);

const ROUND_ORDER = ["r32","r16","qf","sf","final"];
const ROUND_META = {
  r32:{label:"Round of 32",weight:1,games:16}, r16:{label:"Round of 16",weight:2,games:8},
  qf:{label:"Quarterfinals",weight:4,games:4}, sf:{label:"Semifinals",weight:8,games:2}, final:{label:"Final",weight:16,games:1}
};
const DEFAULT_R32 = [
  ["South Africa","Canada"],["Brazil","Japan"],["Germany","Paraguay"],["Netherlands","Morocco"],
  ["Ivory Coast","Norway"],["USA","Bosnia and Herzegovina"],["Croatia","Portugal"],["Colombia","Ghana"],
  ["England","DR Congo"],["Belgium","Senegal"],["Spain","Austria"],["Switzerland","Algeria"],
  ["Australia","Egypt"],["Mexico","Ecuador"],["Argentina","Cabo Verde"],["France","Sweden"]
];
const DEFAULT_LOCKS = {
  r32:"2026-06-28T19:00:00Z", r16:"2026-07-04T16:00:00Z", qf:"2026-07-09T16:00:00Z",
  sf:"2026-07-14T19:00:00Z", final:"2026-07-19T19:00:00Z"
};

let CONFIG=null, ROSTER=[], PICKS={}, USER=null;
let activeTab="bracket", activeRound="r32", pollTimer=null, tickTimer=null, saveTimer=null;

/* ----- session (real website, localStorage is fine here) ----- */
function saveSession(){ try{ localStorage.setItem("wc_user", JSON.stringify(USER)); }catch(e){} }
function loadSession(){ try{ const s=localStorage.getItem("wc_user"); return s?JSON.parse(s):null; }catch(e){ return null; } }
function clearSession(){ try{ localStorage.removeItem("wc_user"); }catch(e){} }

/* ----- API ----- */
async function apiGet(){ const r=await fetch("/api/pool"); return r.json(); }
async function apiPost(body){ const r=await fetch("/api/pool",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)}); const j=await r.json(); if(!r.ok) throw new Error(j.error||"Request failed"); return j; }
async function apiESPN(){ const r=await fetch("/api/espn"); return r.json(); }

async function loadAll(){
  const s=await apiGet();
  if(s.error) throw new Error(s.error);
  CONFIG=s.config; ROSTER=s.roster||[]; PICKS=s.picks||{};
}

function slug(name){ return name.trim().toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-+|-+$/g,"")||"player"; }
function flagHTML(name){
  const t=TEAMS[name]; if(!t) return '<span class="emoji">🏳️</span>';
  return '<img class="flag" src="https://flagcdn.com/w80/'+t.c+'.png" alt="" onerror="this.outerHTML=\'<span class=&quot;emoji&quot;>'+t.e+'</span>\'">';
}
function roundLocked(rk){ const r=CONFIG&&CONFIG.rounds[rk]; if(!r) return true; return Date.now()>=new Date(r.lockISO).getTime(); }
function fmtCountdown(iso){ const ms=new Date(iso).getTime()-Date.now(); if(ms<=0) return "Locked";
  const d=Math.floor(ms/864e5),h=Math.floor(ms%864e5/36e5),m=Math.floor(ms%36e5/6e4),s=Math.floor(ms%6e4/1e3);
  if(d>0)return d+"d "+h+"h "+m+"m"; if(h>0)return h+"h "+m+"m "+s+"s"; return m+"m "+s+"s"; }
function fmtLocal(iso){ try{return new Date(iso).toLocaleString([],{weekday:"short",month:"short",day:"numeric",hour:"numeric",minute:"2-digit"});}catch(e){return iso;} }
function escapeHtml(s){ return (s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function val(id){ const e=document.getElementById(id); return e?e.value:""; }
function qsv(sel){ const e=document.querySelector(sel); return e?e.value:""; }
function setText(id,t){ const e=document.getElementById(id); if(e) e.textContent=t; }

/* ----- scoring ----- */
function scoreFor(pslug){
  const picks=PICKS[pslug]||{}; let total=0; const per={};
  for(const rk of ROUND_ORDER){ const r=CONFIG.rounds[rk]; per[rk]=0;
    if(!r||!r.results) continue; const w=ROUND_META[rk].weight;
    for(const g of r.matchups){ const win=r.results[g.id];
      if(win&&picks[rk]&&picks[rk][g.id]===win){ per[rk]+=w; total+=w; } } }
  return {total,per};
}

/* ===== RENDER ===== */
function render(){
  const el=document.getElementById("screen");
  document.getElementById("poolTitle").textContent = CONFIG? CONFIG.poolName : "World Cup 2026 Pool";
  if(!CONFIG){ document.getElementById("whoBox").innerHTML=""; el.innerHTML=setupScreen(); wireSetup(); return; }
  if(!USER){ document.getElementById("whoBox").innerHTML=""; el.innerHTML=joinScreen(); wireJoin(); return; }
  document.getElementById("whoBox").innerHTML='<span class="pill">'+escapeHtml(USER.name)+(USER.isAdmin?' · commish':'')+'</span><button class="linkbtn" onclick="signOut()">switch</button>';
  el.innerHTML=tabsHTML()+tabBody(); wireTabs();
  if(activeTab==="bracket") wireBracket();
  if(activeTab==="admin") wireAdmin();
}
function signOut(){ USER=null; clearSession(); render(); }

/* ----- setup (first run = commissioner) ----- */
function setupScreen(){
  let rows="";
  DEFAULT_R32.forEach((m,i)=>{ rows+='<div class="admin-game"><span class="small-muted" style="width:26px">'+(i+1)+'</span>'+teamSelect("su_a_"+i,m[0])+'<span class="small-muted">vs</span>'+teamSelect("su_b_"+i,m[1])+'</div>'; });
  return '<div class="card"><h2>Set up your pool 🎉</h2>'+
    '<p class="sub">First one here becomes the commissioner. Pick two passcodes and confirm the Round of 32 matchups.</p>'+
    '<label>Pool name</label><input id="su_name" value="World Cup 2026 Pool" maxlength="40">'+
    '<label>Group passcode <span class="small-muted">(share with your 8 friends)</span></label><input id="su_gp" placeholder="e.g. golazo">'+
    '<label>Commissioner passcode <span class="small-muted">(keep secret)</span></label><input id="su_ap" placeholder="e.g. onlyme123">'+
    '<div class="note">⚠️ The bracket locked only hours ago. Double-check these 16 matchups against ESPN, then they are frozen for everyone.</div>'+
    '<h3>Round of 32 matchups</h3>'+rows+'<div class="err" id="su_err"></div>'+
    '<button class="btn" id="su_go">Create pool</button></div>';
}
function teamSelect(id,v){ let o='<select id="'+id+'">'; ALL_TEAM_NAMES.forEach(n=>o+='<option '+(n===v?'selected':'')+'>'+n+'</option>'); return o+'</select>'; }
function wireSetup(){
  document.getElementById("su_go").onclick=async()=>{
    const name=val("su_name").trim()||"World Cup 2026 Pool", gp=val("su_gp").trim(), ap=val("su_ap").trim();
    if(!gp||!ap){ setText("su_err","Both passcodes are required."); return; }
    if(gp===ap){ setText("su_err","Use two different passcodes."); return; }
    const matchups=[];
    for(let i=0;i<16;i++){ const a=val("su_a_"+i),b=val("su_b_"+i);
      if(a===b){ setText("su_err","Match "+(i+1)+" has the same team twice."); return; }
      matchups.push({id:"r32-"+(i+1),a,b}); }
    const rounds={}; ROUND_ORDER.forEach(rk=>{ rounds[rk]={open:false,lockISO:DEFAULT_LOCKS[rk],matchups:rk==="r32"?matchups:[],results:{}}; });
    rounds.r32.open=true;
    const cfg={poolName:name,groupPass:gp,adminPass:ap,rounds,createdAt:Date.now()};
    try{ await apiPost({type:"create",config:cfg}); }
    catch(e){ setText("su_err",e.message); return; }
    USER={name:"Commissioner",slug:"__commish__",isAdmin:true,adminPass:ap,groupPass:gp}; saveSession();
    activeTab="admin"; await loadAll(); render();
  };
}

/* ----- join ----- */
function joinScreen(){
  return '<div class="card"><h2>Join the pool</h2>'+
    '<p class="sub">Enter your name and the group passcode your commissioner shared.</p>'+
    '<label>Your name</label><input id="j_name" placeholder="e.g. Sam" maxlength="24">'+
    '<label>Group passcode</label><input id="j_gp" placeholder="group passcode">'+
    '<div class="err" id="j_err"></div><button class="btn" id="j_go">Enter</button>'+
    '<button class="btn secondary" id="j_admin">I am the commissioner</button></div>';
}
function wireJoin(){
  document.getElementById("j_go").onclick=async()=>{
    const name=val("j_name").trim(), gp=val("j_gp").trim();
    if(!name){ setText("j_err","Enter your name."); return; }
    const sl=slug(name);
    try{ await apiPost({type:"join",name,slug:sl,groupPass:gp}); }
    catch(e){ setText("j_err",e.message); return; }
    USER={name,slug:sl,isAdmin:false,groupPass:gp}; saveSession();
    await loadAll(); activeTab="bracket"; activeRound=currentRound(); render();
  };
  document.getElementById("j_admin").onclick=async()=>{
    const ap=prompt("Commissioner passcode:"); if(ap==null) return;
    try{ const r=await apiPost({type:"admin",adminPass:ap.trim()});
      USER={name:"Commissioner",slug:"__commish__",isAdmin:true,adminPass:ap.trim(),groupPass:r.groupPass}; saveSession();
      activeTab="admin"; await loadAll(); render();
    }catch(e){ setText("j_err",e.message); }
  };
}

/* ----- tabs ----- */
function tabsHTML(){ const t=(id,l)=>'<div class="tab '+(activeTab===id?'active':'')+'" data-tab="'+id+'">'+l+'</div>';
  return '<div class="tabs">'+t("bracket","🗳️ Bracket")+t("leaderboard","🏅 Leaderboard")+(USER.isAdmin?t("admin","⚙️ Admin"):"")+'</div>'; }
function wireTabs(){ document.querySelectorAll(".tab").forEach(x=>x.onclick=()=>{ activeTab=x.dataset.tab; render(); }); }
function tabBody(){ if(activeTab==="bracket")return bracketScreen(); if(activeTab==="leaderboard")return leaderboardScreen(); if(activeTab==="admin")return adminScreen(); return ""; }
function currentRound(){ for(const rk of ROUND_ORDER){ const r=CONFIG.rounds[rk]; if(r.open&&!roundLocked(rk)) return rk; }
  for(let i=ROUND_ORDER.length-1;i>=0;i--){ if(CONFIG.rounds[ROUND_ORDER[i]].open) return ROUND_ORDER[i]; } return "r32"; }

/* ----- bracket (player picks) ----- */
function bracketScreen(){
  let chips='<div class="chips">';
  ROUND_ORDER.forEach(rk=>chips+='<div class="chip '+(activeRound===rk?'active':'')+'" data-round="'+rk+'">'+ROUND_META[rk].label+'</div>');
  chips+='</div>';
  const r=CONFIG.rounds[activeRound];
  if(!r.open||r.matchups.length===0){
    return chips+'<div class="card center"><h2>'+ROUND_META[activeRound].label+'</h2><p class="sub">Not open yet. The commissioner opens each round once the matchups are set.</p></div>';
  }
  const locked=roundLocked(activeRound);
  const cd=locked?'<span class="countdown locked">🔒 Picks locked</span>':'<span class="countdown" data-cd="'+activeRound+'">⏳ Locks in '+fmtCountdown(r.lockISO)+'</span>';
  let games=""; const myp=(PICKS[USER.slug]||{})[activeRound]||{};
  r.matchups.forEach((g,idx)=>games+=renderMatch(g,idx+1,activeRound,myp[g.id],r.results[g.id],locked));
  const saveBar=locked?"":'<div class="ok" id="saveMsg"></div><button class="btn" id="saveBtn">Save my '+ROUND_META[activeRound].label+' picks</button>';
  return chips+'<div class="card"><div class="row" style="justify-content:space-between"><h2 style="margin:0">'+ROUND_META[activeRound].label+' <span class="small-muted">('+ROUND_META[activeRound].weight+' pt each)</span></h2>'+cd+'</div>'+
    '<p class="sub">'+(locked?'Locked. Showing your picks vs results.':'Tap a team to pick who advances. Change anytime until the round locks.')+'</p>'+games+saveBar+'</div>';
}
function renderMatch(g,n,rk,myPick,result,locked){
  function tb(team){ let cls="team"; const isPick=myPick===team;
    if(locked){ if(result){ if(team===result)cls+=" winner-actual"; if(isPick&&team===result)cls+=" correct"; if(isPick&&team!==result)cls+=" wrong"; } else if(isPick)cls+=" picked"; }
    else if(isPick)cls+=" picked";
    return '<div class="'+cls+'" data-game="'+g.id+'" data-team="'+escapeHtml(team)+'" data-round="'+rk+'">'+flagHTML(team)+'<span class="nm">'+escapeHtml(team)+'</span>'+(isPick?'<span class="chk">●</span>':'')+(locked&&result===team?'<span class="badge win">WON</span>':'')+'</div>'; }
  const head='<div class="mhead"><span>Match '+n+'</span>'+(locked&&result?'<span>Result in</span>':(myPick?'<span>Your pick ✓</span>':'<span>Pick one</span>'))+'</div>';
  return '<div class="match">'+head+'<div class="teamrow">'+tb(g.a)+tb(g.b)+'</div></div>';
}
function wireBracket(){
  document.querySelectorAll(".chip").forEach(c=>c.onclick=()=>{ activeRound=c.dataset.round; render(); });
  const r=CONFIG.rounds[activeRound];
  if(r.open&&!roundLocked(activeRound)){
    document.querySelectorAll(".team").forEach(t=>t.onclick=()=>{
      const gid=t.dataset.game,team=t.dataset.team,rk=t.dataset.round;
      PICKS[USER.slug]=PICKS[USER.slug]||{}; PICKS[USER.slug][rk]=PICKS[USER.slug][rk]||{}; PICKS[USER.slug][rk][gid]=team; render(); scheduleSave();
    });
    const sb=document.getElementById("saveBtn");
    if(sb) sb.onclick=async()=>{
      sb.disabled=true; sb.textContent="Saving...";
      try{ await apiPost({type:"picks",slug:USER.slug,picks:PICKS[USER.slug]||{},groupPass:USER.groupPass,adminPass:USER.adminPass}); setText("saveMsg","Saved! ✓"); }
      catch(e){ setText("saveMsg",e.message); }
      sb.disabled=false; sb.textContent="Save my "+ROUND_META[activeRound].label+" picks";
      setTimeout(()=>setText("saveMsg",""),2500);
    };
  }
}

/* ----- leaderboard ----- */
function leaderboardScreen(){
  if(ROSTER.length===0) return '<div class="card center"><h2>Leaderboard</h2><p class="sub">No players yet. Share the link and group passcode to get your friends in.</p></div>';
  const rows=ROSTER.map(p=>({p,s:scoreFor(p.slug)})).sort((a,b)=>b.s.total-a.s.total||a.p.name.localeCompare(b.p.name));
  const medal=i=>i===0?"🥇":i===1?"🥈":i===2?"🥉":(i+1);
  let html='<div class="card"><h2>🏅 Leaderboard</h2><p class="sub">Round-weighted scoring. Updates as results come in.</p>';
  rows.forEach((r,i)=>{ const me=USER.slug===r.p.slug;
    const bd=ROUND_ORDER.map(rk=>r.s.per[rk]>0?ROUND_META[rk].label.replace("Round of ","R")+" "+r.s.per[rk]:null).filter(Boolean).join(" · ")||"no points yet";
    html+='<div class="lb-row '+(me?"me":"")+'"><div class="lb-rank">'+medal(i)+'</div><div style="flex:1"><div class="lb-name">'+escapeHtml(r.p.name)+(me?' (you)':'')+'</div><div class="lb-sub">'+bd+'</div></div><div class="lb-pts">'+r.s.total+'</div></div>'; });
  html+='</div><div class="card"><h3>How points work</h3><p class="small-muted">Each correct "who advances" pick: Round of 32 = 1, Round of 16 = 2, Quarterfinals = 4, Semifinals = 8, Final = 16. Max 16 per round, 80 total.</p></div>';
  return html;
}

/* ----- admin ----- */
function adminScreen(){
  let html='<div class="card"><h2>⚙️ Commissioner</h2><p class="sub">Open each round, then enter results after the games. The ESPN button fills winners for you.</p>'+
    '<button class="btn secondary small" id="copyInvite">📋 Copy invite text</button><div class="ok" id="copyMsg"></div></div>';
  ROUND_ORDER.forEach((rk,ri)=>{
    const r=CONFIG.rounds[rk]; const locked=roundLocked(rk);
    html+='<div class="card"><div class="row" style="justify-content:space-between"><h2 style="margin:0">'+ROUND_META[rk].label+'</h2><span class="badge '+(r.open?"win":"")+'">'+(r.open?(locked?"OPEN · LOCKED":"OPEN"):"CLOSED")+'</span></div>';
    if(r.matchups.length===0){
      const canGen=ri>0&&allResultsIn(ROUND_ORDER[ri-1]);
      html+='<p class="sub">No matchups yet.</p>'+(ri===0?'':'<button class="btn small" data-gen="'+rk+'" '+(canGen?'':'disabled')+'>Generate from '+ROUND_META[ROUND_ORDER[ri-1]].label+' winners</button>')+(ri>0&&!canGen?'<p class="small-muted">Enter all '+ROUND_META[ROUND_ORDER[ri-1]].label+' results first.</p>':'');
      html+='</div>'; return;
    }
    html+='<label>Lock time (local: '+fmtLocal(r.lockISO)+')</label><input type="datetime-local" data-lock="'+rk+'" value="'+toLocalInput(r.lockISO)+'">';
    html+='<div class="row" style="margin-top:8px"><button class="btn small secondary" data-espn="'+rk+'">⚡ Auto-fill winners from ESPN</button></div><div class="small-muted" data-espnmsg="'+rk+'"></div>';
    html+='<h3>Matchups & results</h3>';
    r.matchups.forEach((g,idx)=>{
      html+='<div class="admin-game"><span class="small-muted" style="width:22px">'+(idx+1)+'</span>'+adminTeamSelect(rk,g.id,"a",g.a)+adminTeamSelect(rk,g.id,"b",g.b)+
        '<select data-result="'+rk+'|'+g.id+'"><option value="">winner?</option><option '+(r.results[g.id]===g.a?'selected':'')+' value="'+escapeHtml(g.a)+'">'+escapeHtml(g.a)+'</option><option '+(r.results[g.id]===g.b?'selected':'')+' value="'+escapeHtml(g.b)+'">'+escapeHtml(g.b)+'</option></select></div>';
    });
    html+='<div class="grid2"><button class="btn small secondary" data-toggle="'+rk+'">'+(r.open?"Close round":"Open round for picks")+'</button><button class="btn small" data-save="'+rk+'">Save '+ROUND_META[rk].label+'</button></div><div class="ok" data-msg="'+rk+'"></div></div>';
  });
  return html;
}
function adminTeamSelect(rk,gid,side,v){ let o='<select data-team="'+rk+'|'+gid+'|'+side+'">'; ALL_TEAM_NAMES.forEach(n=>o+='<option '+(n===v?'selected':'')+'>'+n+'</option>'); return o+'</select>'; }
function allResultsIn(rk){ const r=CONFIG.rounds[rk]; if(!r||r.matchups.length===0) return false; return r.matchups.every(g=>r.results[g.id]); }
function toLocalInput(iso){ const d=new Date(iso),p=n=>String(n).padStart(2,"0"); return d.getFullYear()+"-"+p(d.getMonth()+1)+"-"+p(d.getDate())+"T"+p(d.getHours())+":"+p(d.getMinutes()); }

/* ESPN name matching */
function norm(s){ return (s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z]/g,""); }
const ESPN_ALIAS={ unitedstates:"USA", usa:"USA", cotedivoire:"Ivory Coast", ivorycoast:"Ivory Coast",
  capeverde:"Cabo Verde", caboverde:"Cabo Verde", drcongo:"DR Congo", congodr:"DR Congo",
  democraticrepublicofthecongo:"DR Congo", bosniaherzegovina:"Bosnia and Herzegovina", bosniaandherzegovina:"Bosnia and Herzegovina" };
function lookupTeam(espnName){ const n=norm(espnName); if(ESPN_ALIAS[n]) return ESPN_ALIAS[n];
  for(const t of ALL_TEAM_NAMES){ if(norm(t)===n) return t; } return null; }

async function wireAdmin(){
  const ci=document.getElementById("copyInvite");
  if(ci) ci.onclick=()=>{ const txt="Join our World Cup 2026 bracket pool! Open this link, tap \"Join the pool\", enter your name and the group passcode: "+(USER.groupPass||"(ask the commissioner)")+"\n"+location.origin;
    navigator.clipboard.writeText(txt).then(()=>setText("copyMsg","Copied! Paste into your group chat."),()=>setText("copyMsg","Passcode: "+USER.groupPass)); setTimeout(()=>setText("copyMsg",""),4000); };
  document.querySelectorAll("[data-toggle]").forEach(b=>b.onclick=async()=>{ const rk=b.dataset.toggle; CONFIG.rounds[rk].open=!CONFIG.rounds[rk].open; await saveConfig(); render(); });
  document.querySelectorAll("[data-gen]").forEach(b=>b.onclick=async()=>{ const rk=b.dataset.gen, prev=ROUND_ORDER[ROUND_ORDER.indexOf(rk)-1];
    const winners=CONFIG.rounds[prev].matchups.map(g=>CONFIG.rounds[prev].results[g.id]); const ms=[];
    for(let i=0;i<winners.length;i+=2){ ms.push({id:rk+"-"+(ms.length+1),a:winners[i],b:winners[i+1]}); }
    CONFIG.rounds[rk].matchups=ms; CONFIG.rounds[rk].results={}; await saveConfig(); render(); });
  document.querySelectorAll("[data-espn]").forEach(b=>b.onclick=async()=>{
    const rk=b.dataset.espn; b.disabled=true; const msgEl=document.querySelector('[data-espnmsg="'+rk+'"]'); if(msgEl) msgEl.textContent="Checking ESPN...";
    try{ const data=await apiESPN(); const finished=(data.events||[]).filter(e=>e.completed&&e.winner);
      let filled=0;
      CONFIG.rounds[rk].matchups.forEach(g=>{
        for(const ev of finished){ const ea=lookupTeam(ev.a),eb=lookupTeam(ev.b);
          const set=new Set([ea,eb]); if(set.has(g.a)&&set.has(g.b)){ const w=lookupTeam(ev.winner); if(w===g.a||w===g.b){ const sel=document.querySelector('[data-result="'+rk+'|'+g.id+'"]'); if(sel){ sel.value=w; filled++; } } break; } }
      });
      if(msgEl) msgEl.textContent="Filled "+filled+" of "+CONFIG.rounds[rk].matchups.length+". Review, then hit Save.";
    }catch(e){ if(msgEl) msgEl.textContent="ESPN lookup failed, enter manually."; }
    b.disabled=false;
  });
  document.querySelectorAll("[data-save]").forEach(b=>b.onclick=async()=>{
    const rk=b.dataset.save, r=CONFIG.rounds[rk];
    r.matchups.forEach(g=>{ const a=qsv('[data-team="'+rk+'|'+g.id+'|a"]'),bb=qsv('[data-team="'+rk+'|'+g.id+'|b"]'); if(a)g.a=a; if(bb)g.b=bb; });
    r.matchups.forEach(g=>{ const v=qsv('[data-result="'+rk+'|'+g.id+'"]'); if(v)r.results[g.id]=v; else delete r.results[g.id]; });
    const lk=qsv('[data-lock="'+rk+'"]'); if(lk) r.lockISO=new Date(lk).toISOString();
    const m=document.querySelector('[data-msg="'+rk+'"]');
    try{ await saveConfig(); if(m)m.textContent="Saved! ✓"; }catch(e){ if(m)m.textContent=e.message; }
    setTimeout(render,900);
  });
}
async function saveConfig(){ const out=Object.assign({},CONFIG); delete out.groupPass; delete out.adminPass; await apiPost({type:"config-update",config:out,adminPass:USER.adminPass}); }

/* debounced auto-save of the current user's picks */
function scheduleSave(){
  if(saveTimer) clearTimeout(saveTimer);
  setText("saveMsg","Saving…");
  saveTimer=setTimeout(async()=>{
    try{ await apiPost({type:"picks",slug:USER.slug,picks:PICKS[USER.slug]||{},groupPass:USER.groupPass,adminPass:USER.adminPass}); setText("saveMsg","Saved ✓"); }
    catch(e){ setText("saveMsg","Save failed: "+e.message); }
    setTimeout(()=>setText("saveMsg",""),2000);
  },1000);
}

/* ----- timers ----- */
function startTimers(){
  clearInterval(pollTimer); clearInterval(tickTimer);
  pollTimer=setInterval(async()=>{ if(!USER||activeTab==="admin") return;
    const mine=JSON.parse(JSON.stringify(PICKS[USER.slug]||{}));
    const before=JSON.stringify({c:CONFIG,r:ROSTER,p:PICKS});
    try{ await loadAll(); }catch(e){ return; }
    PICKS[USER.slug]=mine;
    if(JSON.stringify({c:CONFIG,r:ROSTER,p:PICKS})!==before) render(); },20000);
  tickTimer=setInterval(()=>{ document.querySelectorAll("[data-cd]").forEach(el=>{ const rk=el.dataset.cd,r=CONFIG&&CONFIG.rounds[rk]; if(!r)return;
    if(roundLocked(rk)) render(); else el.textContent="⏳ Locks in "+fmtCountdown(r.lockISO); }); },1000);
}

/* ----- boot ----- */
(async function init(){
  const el=document.getElementById("screen"); el.innerHTML='<div class="spin"></div>';
  try{ await loadAll(); }
  catch(e){ el.innerHTML='<div class="card"><h2>Setup needed</h2><p class="sub">'+escapeHtml(e.message)+'</p><p class="small-muted">If this mentions the database, add Upstash Redis in your Vercel project Storage tab, connect it, and Redeploy.</p></div>'; return; }
  const sess=loadSession();
  if(sess && CONFIG){ USER=sess; activeTab=USER.isAdmin?"admin":"bracket"; activeRound=currentRound(); }
  render(); startTimers();
})();
</script>
